<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>人脸识别打卡</title>
<style>
:root{color-scheme:light}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#000;min-height:100vh;color:#fff;-webkit-tap-highlight-color:transparent}
.app{min-height:100vh;display:flex;flex-direction:column}
.header{text-align:center;padding:20px 16px 8px;position:relative;z-index:10}
.header h1{font-size:18px;font-weight:600}.header .proj{font-size:12px;opacity:0.6;margin-top:2px}
.cam-wrap{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.cam-wrap video{width:100%;height:100%;object-fit:cover;position:absolute}
.cam-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.guide{position:absolute;width:65%;aspect-ratio:3/4;border:3px dashed rgba(34,197,94,0.6);border-radius:50%;pointer-events:none;z-index:5;transition:border-color 0.3s}
.guide.ok{border-color:#16a34a;border-style:solid;border-width:4px}
.guide.no{border-color:#ef4444}
.bar{position:absolute;bottom:0;left:0;right:0;padding:16px;text-align:center;z-index:10;background:linear-gradient(transparent,rgba(0,0,0,0.8))}
.status{font-size:15px;margin-bottom:8px;min-height:24px;transition:color 0.3s}
.status.idle{color:#94a3b8}.status.scan{color:#60a5fa;animation:pulse 1.5s infinite}.status.ok{color:#4ade80;font-weight:700;font-size:18px}.status.err{color:#f87171}.status.done{color:#4ade80}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.match-info{font-size:12px;opacity:0.7}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:100;display:none;align-items:center;justify-content:center;flex-direction:column;padding:24px}
.overlay.show{display:flex}
.overlay .icon{font-size:64px;margin-bottom:12px}
.overlay h2{font-size:24px;color:#4ade80;margin-bottom:8px}
.overlay .name{font-size:20px;font-weight:600;margin-bottom:4px}
.overlay .time{font-size:14px;color:#94a3b8;margin-bottom:4px}
.overlay .conf{font-size:12px;color:#64748b}
.loading{position:fixed;inset:0;background:#000;z-index:200;display:flex;align-items:center;justify-content:center;flex-direction:column}
.loading h2{font-size:16px;margin-top:12px}.loading p{font-size:13px;color:#94a3b8;margin-top:4px}
.loading .prog{width:200px;height:6px;background:#334155;border-radius:3px;margin-top:16px;overflow:hidden}
.loading .prog .bar{height:100%;background:#4ade80;border-radius:3px;transition:width 0.3s;width:0%;position:static}
.loading.done{display:none}
</style>
</head>
<body>
<div class="loading" id="loading">
  <div style="font-size:48px">👤</div>
  <h2>正在加载人脸识别模型</h2>
  <p id="loadText">连接中...</p>
  <div class="prog"><div class="bar" id="loadBar"></div></div>
</div>

<div class="app" id="app" style="display:none">
  <div class="header"><h1>👤 人脸识别打卡</h1><div class="proj" id="projName">加载中...</div></div>
  <div class="cam-wrap" id="camWrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="guide" id="guide"></div>
    <div class="bar">
      <div class="status idle" id="status">正在初始化...</div>
      <div class="match-info" id="matchInfo"></div>
    </div>
  </div>
</div>

<div class="overlay" id="result">
  <div class="icon">✅</div>
  <h2>签到成功</h2>
  <div class="name" id="resName"></div>
  <div class="time" id="resTime"></div>
  <div class="conf" id="resConf"></div>
  <button style="margin-top:24px;padding:12px 40px;background:#4ade80;color:#000;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit" onclick="location.reload()">下一位签到</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script>
const API='/api', TH=0.8;
let stream=null,modelsLoaded=false,ld=null,matchRunning=false,done=false,iv=null;

async function callAPI(m,d){try{const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({method:m,...d})});return await r.json()}catch(e){return{ok:false,error:'Network error'}}}

function setLoad(t,p){document.getElementById('loadText').textContent=t;document.getElementById('loadBar').style.width=p+'%'}

async function loadModels(){
  setLoad('Downloading detection model...',15);
  const M='https://cdn.jsdelivr.net/gh/kctdeveloper/faceapijs-weights-models@master/weights/';
  try{
    await faceapi.nets.ssdMobilenetv1.loadFromUri(M);
    setLoad('Downloading landmark model...',40);
    await faceapi.nets.faceLandmark68Net.loadFromUri(M);
    setLoad('Downloading recognition model...',65);
    await faceapi.nets.faceRecognitionNet.loadFromUri(M);
    setLoad('Models ready',85);modelsLoaded=true;return true
  }catch(e){setLoad('Model load failed: '+e.message,0);return false}
}

async function loadFaces(){
  setLoad('Loading registered faces...',90);
  const r=await callAPI('get_face_embeddings');
  if(!r.ok||!r.embeddings||!r.embeddings.length){setLoad('No registered faces found',100);return false}
  ld=r.embeddings.map(e=>new faceapi.LabeledFaceDescriptors(e.name,[new Float32Array(e.embedding)]));
  setLoad('Loaded '+r.count+' faces',95);return true
}

async function startCam(){
  setLoad('Opening camera...',97);
  try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}}});document.getElementById('video').srcObject=stream;await document.getElementById('video').play();return true}catch(e){setLoad('Camera access denied',100);return false}
}

function setStatus(m,c){document.getElementById('status').textContent=m;document.getElementById('status').className='status '+c}

async function startMatch(){
  if(!modelsLoaded||!ld||matchRunning)return;matchRunning=true;done=false;
  const v=document.getElementById('video'),c=document.getElementById('canvas'),ds={width:640,height:480};
  faceapi.matchDimensions(c,ds);setStatus('Please look at the camera','idle');
  iv=setInterval(async()=>{
    if(done||!matchRunning){clearInterval(iv);return}
    try{
      const det=await faceapi.detectSingleFace(v,new faceapi.SsdMobilenetv1Options({minConfidence:0.5})).withFaceLandmarks().withFaceDescriptor();
      const ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height);
      if(!det){document.getElementById('guide').className='guide';setStatus('Please look at the camera','idle');return}
      const rs=faceapi.resizeResults(det,ds),box=rs.detection.box;
      const matcher=new faceapi.FaceMatcher(ld,TH);const match=matcher.findBestMatch(det.descriptor);
      const conf=(1-match.distance);
      const confPct=Math.round(conf*100);
      if(match.label!=='unknown' && conf>=TH){
        // MATCH PASSED >= 80%
        document.getElementById('guide').className='guide ok';ctx.strokeStyle='#16a34a';ctx.lineWidth=4;
        ctx.strokeRect(box.x,box.y,box.width,box.height);
        setStatus('Matched: '+match.label+' ('+confPct+'% >= 80%)','ok');
        document.getElementById('matchInfo').textContent='Confidence: '+confPct+'% - PASSED';
        clearInterval(iv);await submit(match.label,conf);
      }else if(match.label!=='unknown'){
        // Match below threshold
        document.getElementById('guide').className='guide no';ctx.strokeStyle='#f87171';ctx.lineWidth=3;
        ctx.strokeRect(box.x,box.y,box.width,box.height);
        setStatus('Low confidence: '+match.label+' '+confPct+'% (need >=80%)','err');
        document.getElementById('matchInfo').textContent='Confidence: '+confPct+'% - REJECTED';
      }else{
        // Unknown face
        document.getElementById('guide').className='guide no';ctx.strokeStyle='#f87171';ctx.lineWidth=3;
        ctx.strokeRect(box.x,box.y,box.width,box.height);
        setStatus('Unknown face detected','err');
        document.getElementById('matchInfo').textContent='Best match: '+confPct+'% (need >=80%)';
      }
    }catch(e){}
  },600);
}

async function submit(name,conf){
  done=true;matchRunning=false;if(iv)clearInterval(iv);setStatus('Recording check-in...','scan');
  const r=await callAPI('checkin',{name,confidence:conf});
  if(r.ok){setStatus('','done');document.getElementById('result').classList.add('show');
    document.getElementById('resName').textContent='Hello, '+name+'!';
    document.getElementById('resTime').textContent=new Date().toLocaleString('zh-CN');
    document.getElementById('resConf').textContent='Face match: '+Math.round(conf*100)+'% (>=80%)';
    stopCam()}else{setStatus('Failed: '+(r.error||''),'err');done=false}
}

function stopCam(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}}

async function init(){
  const s=await callAPI('get_settings');document.getElementById('projName').textContent='Project: '+(s.project_name||'Default');
  if(!await loadModels())return;if(!await loadFaces())return;if(!await startCam())return;
  document.getElementById('loading').classList.add('done');document.getElementById('app').style.display='flex';startMatch()
}
window.addEventListener('beforeunload',stopCam);init();
</script>
</body>
</html>
